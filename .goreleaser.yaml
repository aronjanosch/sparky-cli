version: 2

project_name: sparky

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: sparky
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: sparky-cli
    binaries: [sparky]
    repository:
      owner: aronjanosch
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: https://github.com/aronjanosch/sparky-cli
    description: CLI for SparkyFitness - log food, exercise, and biometrics from your terminal
    license: MIT

release:
  github:
    owner: aronjanosch
    name: sparky-cli
